<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 p5.js 작품 포트폴리오</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f0f4ff;
      padding: 16px 20px;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    header {
      text-align: center;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #3a3af4;
    }

    header p {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #888;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100%;
      max-width: 1100px;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .cell {
      background: #ffffff;
      border: 1px solid #e0e4f0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .cell-label {
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #3a3af4;
      background: #f5f6ff;
      border-bottom: 1px solid #e0e4f0;
      flex-shrink: 0;
    }

    .preview {
      position: relative;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    .preview iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      border: none;
      transform-origin: center center;
    }

    .work3-desc {
      width: 100%;
      max-width: 1100px;
      padding: 8px 14px;
      background: #ffffff;
      border: 1px solid #e0e4f0;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #555;
      flex-shrink: 0;
    }

    .tag {
      display: inline-block;
      background: #eef0ff;
      color: #3a3af4;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <header>
    <h1>p5.js 포트폴리오</h1>
    <p>최종 과제 · Github Pages 웹사이트 배포</p>
  </header>

  <main id="projects">

    <div class="cell">
      <div class="cell-label">WORK 01 — 정적</div>
      <div class="preview" data-w="600" data-h="400">
        <iframe src="sample1/index.html" width="600" height="400"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">WORK 04 — 동적</div>
      <div class="preview" data-w="600" data-h="400">
        <iframe src="sample4/index.html" width="600" height="400"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">WORK 02 — 정적</div>
      <div class="preview" data-w="400" data-h="600">
        <iframe src="sample2/index.html" width="400" height="600"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">WORK 03 — 동적</div>
      <div class="preview" data-w="400" data-h="600">
        <iframe src="sample3/index.html" width="400" height="600"></iframe>
      </div>
    </div>

  </main>

  <div class="work3-desc">
    <span class="tag">WORK 03</span>
    <span class="tag">Mouse</span> 안경이 커서를 따라감 · 클릭 시 안경알 검게 변화 · 배경색 랜덤 변화 &nbsp;
    <span class="tag">Keyboard</span> ←→ 방향키로 배경색 변경 · Q 위치 고정 · W 고정 해제
  </div>

  <script>
    function fitIframes() {
      document.querySelectorAll('.preview').forEach(p => {
        const fw = p.clientWidth;
        const fh = p.clientHeight;
        const iw = parseInt(p.dataset.w);
        const ih = parseInt(p.dataset.h);
        const scale = Math.min(fw / iw, fh / ih);
        const iframe = p.querySelector('iframe');
        iframe.style.transform = `translate(-50%, -50%) scale(${scale})`;
      });
    }
    window.addEventListener('load', fitIframes);
    window.addEventListener('resize', fitIframes);
  </script>

</body>
</html>
